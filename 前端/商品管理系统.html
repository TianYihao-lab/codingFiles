<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>超市商品管理系统</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      padding: 20px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
    }

    h1 {
      text-align: center;
      color: #fff;
      margin-bottom: 30px;
      font-size: 32px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
      margin-bottom: 20px;
    }

    .stat-card {
      background: #fff;
      padding: 15px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      text-align: center;
    }

    .stat-card h3 {
      color: #666;
      font-size: 12px;
      margin-bottom: 8px;
      text-transform: uppercase;
    }

    .stat-card .value {
      font-size: 28px;
      color: #667eea;
      font-weight: bold;
    }

    .form {
      background: #fff;
      padding: 20px;
      border-radius: 8px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .form-group {
      margin-bottom: 15px;
    }

    .form-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
    }

    label {
      display: block;
      margin-bottom: 5px;
      color: #333;
      font-weight: 500;
      font-size: 14px;
    }

    .form input, .form select {
      width: 100%;
      padding: 10px;
      border: 2px solid #e0e0e0;
      border-radius: 5px;
      font-size: 14px;
      transition: border-color 0.3s;
    }

    .form input:focus, .form select:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
    }

    .form input.error {
      border-color: #ff6b6b;
    }

    .error-msg {
      color: #ff6b6b;
      font-size: 12px;
      margin-top: 5px;
      display: none;
    }

    .form-buttons {
      display: flex;
      gap: 10px;
      margin-top: 15px;
    }

    button {
      padding: 10px 20px;
      cursor: pointer;
      border: none;
      border-radius: 5px;
      font-size: 14px;
      font-weight: 600;
      transition: all 0.3s;
    }

    .btn-primary {
      background: #667eea;
      color: #fff;
      flex: 1;
    }

    .btn-primary:hover {
      background: #5568d3;
      transform: translateY(-2px);
      box-shadow: 0 4px 8px rgba(102, 126, 234, 0.4);
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    .btn-secondary {
      background: #f0f0f0;
      color: #333;
    }

    .btn-secondary:hover {
      background: #e0e0e0;
    }

    .btn-delete {
      background: #ff6b6b;
      color: #fff;
      padding: 6px 12px;
      font-size: 12px;
    }

    .btn-delete:hover {
      background: #ff5252;
    }

    .btn-edit {
      background: #4ecdc4;
      color: #fff;
      padding: 6px 12px;
      font-size: 12px;
      margin-right: 5px;
    }

    .btn-edit:hover {
      background: #45b8b0;
    }

    .search-section {
      background: #fff;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      display: flex;
      gap: 10px;
    }

    .search-section input {
      flex: 1;
      padding: 10px;
      border: 2px solid #e0e0e0;
      border-radius: 5px;
      font-size: 14px;
    }

    .search-section button {
      padding: 10px 20px;
      background: #667eea;
      color: #fff;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      border-radius: 8px;
      overflow: hidden;
    }

    th, td {
      border: 1px solid #e0e0e0;
      padding: 12px;
      text-align: center;
    }

    th {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      font-weight: 600;
    }

    tr:hover {
      background: #f9f9f9;
    }

    tr:nth-child(even) {
      background: #fafafa;
    }

    .empty-message {
      text-align: center;
      padding: 40px;
      color: #999;
      font-size: 16px;
    }

    .message {
      padding: 15px;
      border-radius: 5px;
      margin-bottom: 15px;
      display: none;
    }

    .message.success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }

    .message.error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>🛒 超市商品管理系统</h1>

  <div id="message" class="message"></div>

  <div class="stats">
    <div class="stat-card">
      <h3>商品总数</h3>
      <div class="value" id="totalProducts">0</div>
    </div>
    <div class="stat-card">
      <h3>总库存</h3>
      <div class="value" id="totalStock">0</div>
    </div>
    <div class="stat-card">
      <h3>总价值</h3>
      <div class="value" id="totalValue">¥0.00</div>
    </div>
  </div>

  <div class="form">
    <h2 style="margin-bottom: 20px; color: #333;">添加/编辑商品</h2>
    <div class="form-row">
      <div class="form-group">
        <label for="name">商品名称</label>
        <input id="name" placeholder="请输入商品名称" maxlength="50">
        <div class="error-msg" id="name-error">商品名称不能为空</div>
      </div>
      <div class="form-group">
        <label for="price">价格 (¥)</label>
        <input id="price" type="number" placeholder="请输入价格" min="0" step="0.01">
        <div class="error-msg" id="price-error">价格必须大于0</div>
      </div>
      <div class="form-group">
        <label for="stock">库存</label>
        <input id="stock" type="number" placeholder="请输入库存数量" min="0" step="1">
        <div class="error-msg" id="stock-error">库存必须为非负数</div>
      </div>
      <div class="form-group">
        <label for="category">分类</label>
        <select id="category">
          <option value="">请选择分类</option>
          <option value="食品">食品</option>
          <option value="饮料">饮料</option>
          <option value="日用品">日用品</option>
          <option value="电子产品">电子产品</option>
          <option value="服装">服装</option>
          <option value="其他">其他</option>
        </select>
      </div>
    </div>
    <div class="form-buttons">
      <button id="submitBtn" class="btn-primary" onclick="addProduct()">添加商品</button>
      <button class="btn-secondary" onclick="resetForm()">清空</button>
      <button id="cancelEditBtn" class="btn-secondary" style="display:none;" onclick="cancelEdit()">取消编辑</button>
    </div>
  </div>

  <div class="search-section">
    <input id="searchInput" placeholder="按名称或分类搜索..." onkeyup="searchProducts()">
    <button class="btn-primary" onclick="searchProducts()">搜索</button>
    <button class="btn-secondary" onclick="clearSearch()">显示全部</button>
  </div>

  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>名称</th>
        <th>价格</th>
        <th>库存</th>
        <th>分类</th>
        <th>总价值</th>
        <th>操作</th>
      </tr>
    </thead>
    <tbody id="productList">
      <tr><td colspan="7" class="empty-message">暂无商品数据，请添加商品</td></tr>
    </tbody>
  </table>
</div>

<script>
  // 本地存储键名
  const STORAGE_KEY = 'products_data';
  let allProducts = [];
  let editingId = null;

  // 初始化
  function init() {
    loadProducts();
  }

  // 从本地存储加载商品
  function loadProducts() {
    allProducts = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
    renderProducts(allProducts);
    updateStats();
  }

  // 渲染商品列表
  function renderProducts(products) {
    const list = document.getElementById('productList');
    
    if (products.length === 0) {
      list.innerHTML = '<tr><td colspan="7" class="empty-message">暂无商品数据，请添加商品</td></tr>';
      return;
    }

    list.innerHTML = products.map(p => `
      <tr>
        <td>#${p.id}</td>
        <td>${escapeHtml(p.name)}</td>
        <td>¥${parseFloat(p.price).toFixed(2)}</td>
        <td>${p.stock}</td>
        <td>${p.category || '-'}</td>
        <td>¥${(p.price * p.stock).toFixed(2)}</td>
        <td>
          <button class="btn-edit" onclick="editProduct(${p.id})">编辑</button>
          <button class="btn-delete" onclick="deleteProduct(${p.id})">删除</button>
        </td>
      </tr>
    `).join('');
  }

  // 验证表单
  function validateForm() {
    let isValid = true;
    const nameInput = document.getElementById('name');
    const priceInput = document.getElementById('price');
    const stockInput = document.getElementById('stock');

    // 清除之前的错误状态
    document.querySelectorAll('.error-msg').forEach(el => el.style.display = 'none');
    document.querySelectorAll('input').forEach(el => el.classList.remove('error'));

    // 验证名称
    if (!nameInput.value.trim()) {
      showError('name-error');
      nameInput.classList.add('error');
      isValid = false;
    }

    // 验证价格
    if (!priceInput.value || parseFloat(priceInput.value) <= 0) {
      showError('price-error');
      priceInput.classList.add('error');
      isValid = false;
    }

    // 验证库存
    if (!stockInput.value || parseInt(stockInput.value) < 0) {
      showError('stock-error');
      stockInput.classList.add('error');
      isValid = false;
    }

    return isValid;
  }

  // 显示错误消息
  function showError(errorId) {
    document.getElementById(errorId).style.display = 'block';
  }

  // 添加或更新商品
  function addProduct() {
    if (!validateForm()) {
      showMessage('请填写所有必填字段且内容有效', 'error');
      return;
    }

    const product = {
      name: document.getElementById('name').value.trim(),
      price: parseFloat(document.getElementById('price').value),
      stock: parseInt(document.getElementById('stock').value),
      category: document.getElementById('category').value || '其他'
    };

    if (editingId !== null) {
      // 编辑已有商品
      const index = allProducts.findIndex(p => p.id === editingId);
      if (index !== -1) {
        allProducts[index] = { ...allProducts[index], ...product };
        showMessage('商品已更新', 'success');
      }
      cancelEdit();
    } else {
      // 添加新商品
      product.id = allProducts.length > 0 ? Math.max(...allProducts.map(p => p.id)) + 1 : 1;
      allProducts.push(product);
      showMessage('商品已添加', 'success');
    }

    saveProducts();
    loadProducts();
    resetForm();
  }

  // 编辑商品
  function editProduct(id) {
    const product = allProducts.find(p => p.id === id);
    if (!product) return;

    editingId = id;
    document.getElementById('name').value = product.name;
    document.getElementById('price').value = product.price;
    document.getElementById('stock').value = product.stock;
    document.getElementById('category').value = product.category;

    document.getElementById('submitBtn').textContent = '更新商品';
    document.getElementById('cancelEditBtn').style.display = 'inline-block';

    // 滚动到表单
    document.querySelector('.form').scrollIntoView({ behavior: 'smooth' });
  }

  // 取消编辑
  function cancelEdit() {
    editingId = null;
    document.getElementById('submitBtn').textContent = '添加商品';
    document.getElementById('cancelEditBtn').style.display = 'none';
    resetForm();
  }

  // 删除商品
  function deleteProduct(id) {
    if (confirm('确定要删除这个商品吗？')) {
      allProducts = allProducts.filter(p => p.id !== id);
      saveProducts();
      loadProducts();
      showMessage('商品已删除', 'success');
    }
  }

  // 搜索商品
  function searchProducts() {
    const keyword = document.getElementById('searchInput').value.trim().toLowerCase();
    if (!keyword) {
      renderProducts(allProducts);
      return;
    }

    const filtered = allProducts.filter(p =>
      p.name.toLowerCase().includes(keyword) ||
      p.category.toLowerCase().includes(keyword)
    );
    renderProducts(filtered);
  }

  // 清除搜索
  function clearSearch() {
    document.getElementById('searchInput').value = '';
    renderProducts(allProducts);
  }

  // 重置表单
  function resetForm() {
    document.getElementById('name').value = '';
    document.getElementById('price').value = '';
    document.getElementById('stock').value = '';
    document.getElementById('category').value = '';
    document.querySelectorAll('.error-msg').forEach(el => el.style.display = 'none');
    document.querySelectorAll('input').forEach(el => el.classList.remove('error'));
  }

  // 保存到本地存储
  function saveProducts() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(allProducts));
  }

  // 更新统计信息
  function updateStats() {
    const totalProducts = allProducts.length;
    const totalStock = allProducts.reduce((sum, p) => sum + p.stock, 0);
    const totalValue = allProducts.reduce((sum, p) => sum + (p.price * p.stock), 0);

    document.getElementById('totalProducts').textContent = totalProducts;
    document.getElementById('totalStock').textContent = totalStock;
    document.getElementById('totalValue').textContent = '¥' + totalValue.toFixed(2);
  }

  // 显示消息提示
  function showMessage(text, type) {
    const msgEl = document.getElementById('message');
    msgEl.textContent = text;
    msgEl.className = 'message ' + type;
    msgEl.style.display = 'block';

    setTimeout(() => {
      msgEl.style.display = 'none';
    }, 3000);
  }

  // HTML转义防止XSS
  function escapeHtml(text) {
    const map = {
      '&': '&amp;',
      '<': '&lt;',
      '>': '&gt;',
      '"': '&quot;',
      "'": '&#039;'
    };
    return text.replace(/[&<>"']/g, m => map[m]);
  }

  // 页面加载完成后初始化
  document.addEventListener('DOMContentLoaded', init);
</script>

</body>
</html>
