<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML·练习</title>
</head>

<body>
    <h1>一级标签</h1>
    <h2>二级标签</h2>
    <h3>三级标签</h3>
    <h4>四级标签</h4>
    <h5>五级标签</h5>
    
    <p>这是一个段落标签</p>
    <p>
        更改文本样式 
        <b>加粗</b>、
        <i>斜体</i>、
        <u>下划线</u> 、
        <del>删除线</del>
    </p>

    <ul>
        <li>无序列表 1</li>
        <li>无序列表 2</li>
        <li>无序列表 3</li>
    </ul>

    <ol>
        <li>有序列表 1</li>
        <li>有序列表 2</li>
        <li>有序列表 3</li>
    </ol>

    <table border="2">  <!--border 是table标签的一个属性，代表着边框宽度-->
        <tr>
            <th>列标题 1</th>
            <th>列标题 2</th>
            <th>列标题 3</th>
        </tr>

        <tr>
            <td>11</td>
            <td>12</td>
            <td>13</td>
        </tr>

         <tr>
            <td>21</td>
            <td>22</td>
            <td>23</td>
        </tr>

         <tr>
            <td>31</td>
            <td>32</td>
            <td>33</td>
        </tr>
        
    </table>

</body>
</html>
